<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharusuri EdTech - Rural Education</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="main-header">
        <h1>Sharusuri EdTech Company</h1>
        <p>Bridging the digital divide with affordable learning.</p>
        <a href="#contact" class="btn">Join Pilot Program</a>
    </header>
    <main class="container">
        <!-- Content Sections -->
        <section class="roadmap">
            <h2>Our Scalability Roadmap</h2>
            <div class="grid">
                <div class="card"><h3>Phase 1</h3><p>Village Pilot</p></div>
                <div class="card"><h3>Phase 2</h3><p>City Scale</p></div>
                <div class="card"><h3>Phase 3</h3><p>Nationwide</p></div>
            </div>
        </section>
        <section id="contact" class="form-section">
            <form id="leadForm">
                <h2>Express Interest</h2>
                <input type="text" id="name" placeholder="Name" required>
                <input type="email" id="email" placeholder="Email" required>
                <button type="submit" class="btn">Submit</button>
            </form>
        </section>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
